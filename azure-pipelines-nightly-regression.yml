############################################################
# NIGHTLY REGRESSION PIPELINE
############################################################

trigger: none

pr: none

schedules:

- cron: "30 20 * * *"
  displayName: Nightly Regression (2:00 AM IST)

  branches:
    include:
      - main

  always: true

pool:
  vmImage: windows-latest

variables:

  BuildConfiguration: Release

  Browser: Chrome

  Environment: QA

  Headless: true

steps:

- checkout: self

- task: UseDotNet@2
  displayName: Install .NET SDK
  inputs:
    packageType: sdk
    version: 9.0.x

- task: DotNetCoreCLI@2
  displayName: Restore Packages
  inputs:
    command: restore
    projects: SpecFlowAutomationFramework.csproj

- task: DotNetCoreCLI@2
  displayName: Build Project
  inputs:
    command: build
    projects: SpecFlowAutomationFramework.csproj
    arguments: '--configuration $(BuildConfiguration) --no-restore'

- powershell: |

    Write-Host ""
    Write-Host "========================================"
    Write-Host " NIGHTLY REGRESSION EXECUTION "
    Write-Host "========================================"

    Write-Host "Execution Time : $(Build.QueuedTime)"
    Write-Host "Browser        : $(Browser)"
    Write-Host "Environment    : $(Environment)"
    Write-Host "Category       : Regression"
    Write-Host "Headless       : $(Headless)"

    $env:Browser="$(Browser)"
    $env:Environment="$(Environment)"
    $env:Headless="$(Headless)"

    dotnet test SpecFlowAutomationFramework.csproj `
      --configuration $(BuildConfiguration) `
      --no-build `
      --logger "trx;LogFileName=NightlyRegression.trx" `
      --filter "Category=Regression"

  displayName: Execute Regression Suite

- task: PublishTestResults@2
  displayName: Publish Test Results
  condition: always()

  inputs:
    testResultsFormat: VSTest
    testResultsFiles: '**/NightlyRegression.trx'
    failTaskOnFailedTests: false
    testRunTitle: Nightly Regression

- task: PublishPipelineArtifact@1
  displayName: Publish Reports
  condition: always()

  inputs:
    targetPath: Reports
    artifact: Nightly-Regression-Reports